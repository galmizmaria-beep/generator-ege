<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив ЕГЭ | Русский язык</title>
    <!-- Подключаем винтажные и печатные шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        /* ================= ВИНТАЖНЫЙ ДИЗАЙН ================= */
        :root {
            --paper-bg: #eaddc5;
            --paper-dark: #d5c5a9;
            --ink-black: #2b2b2b;
            --ink-red: #8b2626;
            --ink-blue: #2a3c5a;
            --font-typewriter: 'Special Elite', monospace;
            --font-heading: 'Playfair Display', serif;
            --font-handwriting: 'Caveat', cursive;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #c2b29a;
            background-image: url('https://www.transparenttextures.com/patterns/old-wall.png'); /* Текстура старой стены/бумаги */
            color: var(--ink-black);
            font-family: var(--font-typewriter);
            line-height: 1.6;
        }

        /* Эффект старой бумаги для блоков */
        .paper-box {
            background-color: var(--paper-bg);
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper.png');
            box-shadow: 2px 4px 15px rgba(0, 0, 0, 0.3), inset 0 0 40px rgba(139, 115, 85, 0.1);
            border: 1px solid #bda88a;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-bottom: 3px double var(--ink-black);
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 3em;
            margin: 0;
            color: var(--ink-black);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .author-note {
            font-family: var(--font-handwriting);
            font-size: 1.8em;
            color: var(--ink-blue);
            transform: rotate(-2deg);
            display: inline-block;
            margin-top: -10px;
        }

        /* Ссылка на ФИПИ как газетная вырезка */
        .fipi-link {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 15px;
            background: #f4ecd8;
            border: 1px dashed var(--ink-black);
            color: var(--ink-red);
            text-decoration: none;
            font-weight: bold;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .fipi-link:hover {
            background: var(--paper-dark);
            transform: translateY(-2px);
        }

        /* ================= ОСНОВНАЯ СЕТКА ================= */
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 300px;
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* ЛЕВАЯ КОЛОНКА: БАНК ЗАДАНИЙ */
        .tasks-bank {
            padding: 30px;
        }

        .section-title {
            font-family: var(--font-heading);
            border-bottom: 2px solid var(--ink-black);
            padding-bottom: 5px;
            margin-top: 0;
            font-size: 1.8em;
        }

        /* Аккордеоны заданий */
        details {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid #c8b99c;
            padding: 10px;
            transition: all 0.3s;
        }

        details[open] {
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        summary {
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            list-style: none; /* Убираем стандартный треугольник */
            display: flex;
            align-items: center;
        }
        
        summary::-webkit-details-marker { display: none; }
        
        summary::before {
            content: '► ';
            color: var(--ink-red);
            margin-right: 10px;
            font-size: 0.8em;
        }
        details[open] summary::before { content: '▼ '; }

        .task-content {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #bda88a;
            font-size: 0.95em;
        }

        .general-text {
            background: rgba(0,0,0,0.03);
            padding: 15px;
            border-left: 4px solid var(--ink-blue);
            margin-bottom: 15px;
            font-style: italic;
        }

        /* Поля ввода в стиле печатной машинки */
        input[type="text"], input[type="number"], textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--ink-black);
            font-family: var(--font-typewriter);
            font-size: 1em;
            color: var(--ink-blue);
            padding: 2px 5px;
            outline: none;
        }
        input[type="text"]:focus { border-bottom: 2px solid var(--ink-red); }

        /* Кнопки в стиле старых штампов/клавиш */
        button {
            font-family: var(--font-typewriter);
            background: var(--paper-bg);
            border: 1px solid var(--ink-black);
            padding: 5px 15px;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--ink-black);
            transition: 0.1s;
            text-transform: uppercase;
            font-weight: bold;
        }
        button:active {
            box-shadow: 0 0 0 var(--ink-black);
            transform: translate(2px, 2px);
        }

        .check-btn { color: var(--ink-blue); font-size: 0.9em;}
        
        /* Штамп результата проверки */
        .result-stamp {
            display: inline-block;
            margin-left: 15px;
            font-family: var(--font-heading);
            font-size: 1.2em;
            padding: 2px 8px;
            border: 2px solid transparent;
            transform: rotate(-3deg);
            opacity: 0;
            transition: 0.3s;
        }
        .result-stamp.correct {
            color: #27632a;
            border-color: #27632a;
            opacity: 1;
        }
        .result-stamp.incorrect {
            color: var(--ink-red);
            border-color: var(--ink-red);
            opacity: 1;
        }

        /* ПРАВАЯ КОЛОНКА: НАСТРОЙКИ (Чек-лист) */
        .settings-panel {
            padding: 20px;
            height: fit-content;
        }

        /* CSS Скрепка */
        .paperclip {
            position: absolute;
            top: -15px;
            left: 20px;
            width: 15px;
            height: 45px;
            border: 3px solid #888;
            border-radius: 10px;
            background: transparent;
            z-index: 10;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5), 2px 2px 3px rgba(0,0,0,0.3);
        }
        .paperclip::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -3px;
            width: 15px;
            height: 25px;
            border: 3px solid #888;
            border-top: none;
            border-radius: 0 0 10px 10px;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
        }

        .qty-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dotted #bda88a;
            padding: 5px 0;
        }
        .qty-row input {
            width: 40px;
            text-align: center;
        }

        /* НИЖНЯЯ ПАНЕЛЬ: ГЕНЕРАЦИЯ */
        .action-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin-top: 10px;
        }
        .action-bar button {
            font-size: 1.2em;
            padding: 10px 20px;
            background: var(--paper-dark);
        }

        /* РЕЖИМ СГЕНЕРИРОВАННОГО ВАРИАНТА */
        #generated-view {
            display: none;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .print-btn { float: right; margin-bottom: 20px; }

        /* ПЕЧАТЬ */
        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            .paper-box { background: none; border: none; box-shadow: none; }
            .action-bar, .fipi-link, .print-btn, .check-btn, #editor-view { display: none !important; }
            #generated-view { display: block !important; padding: 0; }
            input[type="text"] { border-bottom: 1px solid black; }
        }
    </style>
</head>
<body>

    <header class="paper-box">
        <h1>Архив Экзаменатора</h1>
        <div class="author-note">ЕГЭ по русскому языку (Проект 2026)</div><br>
        <a href="https://oge.fipi.ru/bank/index.php?proj=2F5EE3B12FE2A0EA40B06BF61A015416" target="_blank" class="fipi-link">
            ☛ Открытый банк заданий ФИПИ
        </a>
    </header>

    <!-- РЕЖИМ РЕДАКТОРА (БАНК ЗАДАНИЙ) -->
    <div id="editor-view" class="main-layout">
        
        <!-- Левая колонка: Список заданий -->
        <div class="paper-box tasks-bank" id="tasks-container">
            <h2 class="section-title">Материалы для подготовки (Ким)</h2>
            <!-- Аккордеоны заданий будут сгенерированы скриптом -->
        </div>

        <!-- Правая колонка: Настройки варианта -->
        <div class="paper-box settings-panel">
            <div class="paperclip"></div>
            <h2 class="section-title" style="font-size: 1.4em;">Конструктор</h2>
            <div style="font-family: var(--font-handwriting); color: var(--ink-red); font-size: 1.3em; margin-bottom: 10px;">
                Укажите количество:
            </div>
            <div id="quantity-container">
                <!-- Поля количества генерируются скриптом -->
            </div>
        </div>

        <!-- Нижняя панель кнопок -->
        <div class="paper-box action-bar">
            <button onclick="generateVariant()">Собрать вариант на печать</button>
            <button onclick="resetQuantities()" style="color: var(--ink-red);">Сбросить всё</button>
        </div>
    </div>

    <!-- РЕЖИМ СГЕНЕРИРОВАННОГО ВАРИАНТА (ДЛЯ ПЕЧАТИ/РЕШЕНИЯ) -->
    <div id="generated-view" class="paper-box">
        <button class="print-btn" onclick="window.print()">🖨 Печать (PDF)</button>
        <button class="print-btn" style="margin-right: 10px;" onclick="backToEditor()">🔙 Назад в архив</button>
        
        <h1 style="text-align: center; border-bottom: 2px solid #000; margin-bottom: 30px;">ЭКЗАМЕНАЦИОННЫЙ ВАРИАНТ</h1>
        <div id="generated-content">
            <!-- Сюда попадут выбранные задания -->
        </div>
    </div>

    <script>
        // БАЗА ДАННЫХ ЗАДАНИЙ (На основе предоставленного PDF Демо 2026)
        const commonText1_3 = `<b>(1)</b> В Россию пришёл Пушкинский праздник... Время неумолимо, но Александр Сергеевич, как и сама Россия, был, есть и будет нашей духовной сущностью на все времена. Думаю, что для поэта, живущего вне времени, не было привычного нам понятия прошлого и будущего: прошлое жило в нём, в настоящем жил он сам, будущее прозревал его гений.<br>
        <b>(2)</b> Пушкин для нас есть сама Россия, сама русская душа – загадочная и непонятная. Он искал национальный характер, прозревая будущее. В его стихотворении «Странник» удивительным и непостижимым образом угадывается характер Льва Николаевича Толстого, появление которого Пушкин предчувствовал. Случайность? Совпадение? Нет! Это гениальное прозрение.<br>
        <b>(3)</b> Пушкин – явление национальное мирового масштаба. Языки, судьбы и характеры народов подобны рекам, опоясывающим планету. Пушкин мог войти в любую из этих рек, не рассыпаясь по дну мелкой галькой, а растворившись в реке, &lt;…&gt; становился вселенским потоком.`;

        const tasksDB = {
            1: {
                title: 'Задание 1. Текст и местоимение',
                instruction: 'Прочитайте текст и выполните задания 1-3.',
                generalText: commonText1_3,
                taskText: 'Самостоятельно подберите <b>определительное местоимение</b>, которое должно стоять на месте пропуска в третьем (3) абзаце текста. Запишите это местоимение.',
                answer: ['сам', 'весь'], // Допустимые варианты
                type: 'input'
            },
            2: {
                title: 'Задание 2. Лексическое значение',
                instruction: 'Прочитайте текст и выполните задания 1-3.',
                generalText: commonText1_3,
                taskText: 'Укажите варианты ответов, в которых лексическое значение выделенного слова соответствует его значению в данном тексте.<br>1) ПРИЙТИ. Достичь чего-либо...<br>2) ДУХОВНЫЙ. Относящийся к религии...<br>3) ХАРАКТЕР. Сильная воля...<br>4) ПРОЗРЕНИЕ. Внезапное просветление мысли.<br>5) КРОВЬ. Происхождение.',
                answer: ['45', '54'],
                type: 'input'
            },
            4: {
                title: 'Задание 4. Орфоэпические нормы (ударение)',
                taskText: 'Укажите варианты ответов, в которых верно выделена буква, обозначающая ударный гласный звук. Запишите номера ответов.<br><br>1) ногтЕй<br>2) кремЕнь<br>3) нОвостей<br>4) туфлЯ<br>5) приручЁнный',
                answer: ['125', '152', '215', '251', '512', '521'],
                type: 'input'
            },
            6: {
                title: 'Задание 6. Лексические нормы',
                taskText: 'Отредактируйте предложение: исправьте лексическую ошибку, <b>исключив лишнее слово</b>. Выпишите это слово.<br><br><i>Посев семян хвойных пород необходимо проводить в <b>очень оптимальные</b> сроки, когда почва влажная и температура её верхних слоёв достигает 6–8 °С.</i>',
                answer: ['очень'],
                type: 'input'
            },
            27: {
                title: 'Задание 27. Сочинение',
                instruction: 'Прочитайте текст К.Я. Ваншенкина (о службе в армии) и выполните задание.',
                taskText: 'Напишите сочинение-рассуждение по проблеме, поставленной в исходном тексте: <b>«Какой опыт приобретает молодой человек, служа в армии?»</b>.<br><br>Сформулируйте позицию автора. Прокомментируйте, приведите два примера-иллюстрации. Сформулируйте и обоснуйте своё отношение (не менее 150 слов).',
                type: 'essay'
            }
        };

        // Заполняем остальные задания заглушками для полноты списка (до 27)
        for (let i = 1; i <= 27; i++) {
            if (!tasksDB[i]) {
                tasksDB[i] = {
                    title: `Задание ${i}. Типовое задание ФИПИ`,
                    taskText: `Здесь располагается формулировка задания №${i} согласно спецификации КИМ ЕГЭ. Вставьте пропущенные буквы, раскройте скобки или выберите правильный вариант ответа.`,
                    answer: ['123'],
                    type: 'input'
                };
            }
        }

        // ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА
        document.addEventListener('DOMContentLoaded', () => {
            const tasksContainer = document.getElementById('tasks-container');
            const qtyContainer = document.getElementById('quantity-container');

            for (let i = 1; i <= 27; i++) {
                const task = tasksDB[i];
                
                // 1. Создаем аккордеоны для левой колонки
                let contentHtml = '';
                if (task.instruction) contentHtml += `<div style="font-weight:bold; margin-bottom:10px;">${task.instruction}</div>`;
                if (task.generalText) contentHtml += `<div class="general-text">${task.generalText}</div>`;
                contentHtml += `<div>${task.taskText}</div>`;

                let inputArea = '';
                if (task.type === 'input') {
                    // Передаем ответ в функцию проверки как JSON строку
                    const answersJson = JSON.stringify(task.answer).replace(/"/g, '&quot;');
                    inputArea = `
                        <div style="margin-top: 15px;">
                            <label>Ответ: </label>
                            <input type="text" id="ans-editor-${i}" placeholder="Введите ответ...">
                            <button class="check-btn" onclick="checkAnswer(${i}, '${answersJson}')">Проверить</button>
                            <span class="result-stamp" id="res-editor-${i}"></span>
                        </div>
                    `;
                } else if (task.type === 'essay') {
                    inputArea = `
                        <div style="margin-top: 15px;">
                            <textarea rows="6" style="width:100%; border:1px solid #bda88a; padding:10px; font-family:var(--font-typewriter);" placeholder="Черновик для сочинения..."></textarea>
                        </div>
                    `;
                }

                tasksContainer.innerHTML += `
                    <details>
                        <summary>${task.title}</summary>
                        <div class="task-content">
                            ${contentHtml}
                            ${inputArea}
                        </div>
                    </details>
                `;

                // 2. Создаем поля количества для правой колонки
                qtyContainer.innerHTML += `
                    <div class="qty-row">
                        <label>Задание ${i}</label>
                        <input type="number" id="qty-${i}" value="0" min="0" max="10">
                    </div>
                `;
            }
        });

        // ПРОВЕРКА ОТВЕТА В РЕДАКТОРЕ
        function checkAnswer(taskId, validAnswersStr) {
            const inputEl = document.getElementById(`ans-editor-${taskId}`);
            const resultEl = document.getElementById(`res-editor-${taskId}`);
            const userVal = inputEl.value.trim().toLowerCase().replace(/\s+/g, ''); // убираем пробелы
            
            const validAnswers = JSON.parse(validAnswersStr.replace(/&quot;/g, '"'));
            
            // Проверяем, есть ли ответ пользователя в массиве правильных ответов
            let isCorrect = false;
            for(let ans of validAnswers) {
                if(userVal === ans.toLowerCase().replace(/\s+/g, '')) {
                    isCorrect = true; break;
                }
            }

            if (isCorrect) {
                resultEl.textContent = "ВЕРНО";
                resultEl.className = "result-stamp correct";
            } else {
                resultEl.textContent = "ОШИБКА";
                resultEl.className = "result-stamp incorrect";
            }
        }

        // СБРОС КОЛИЧЕСТВ
        function resetQuantities() {
            for (let i = 1; i <= 27; i++) {
                document.getElementById(`qty-${i}`).value = 0;
            }
        }

        // ГЕНЕРАЦИЯ ВАРИАНТА ДЛЯ ПЕЧАТИ
        function generateVariant() {
            const generatedContent = document.getElementById('generated-content');
            generatedContent.innerHTML = '';
            let totalTasksAdded = 0;
            let currentTaskNum = 1; // Сквозная нумерация в сгенерированном варианте

            for (let i = 1; i <= 27; i++) {
                const qty = parseInt(document.getElementById(`qty-${i}`).value) || 0;
                
                for(let j = 0; j < qty; j++) {
                    const task = tasksDB[i];
                    let html = `<div style="margin-bottom: 40px; page-break-inside: avoid;">`;
                    
                    html += `<h3 style="font-family: var(--font-heading);">Задание № ${currentTaskNum} (Тип ${i})</h3>`;
                    
                    if (task.instruction) html += `<p><b>${task.instruction}</b></p>`;
                    if (task.generalText) html += `<div class="general-text" style="font-size:0.9em;">${task.generalText}</div>`;
                    
                    html += `<p>${task.taskText}</p>`;
                    
                    if(task.type === 'input') {
                        html += `<div style="margin-top: 20px;">Ответ: _______________________</div>`;
                    } else {
                        html += `<div style="margin-top: 20px; border: 1px dashed #000; height: 300px; padding: 10px; color: #999;">Место для написания ответа...</div>`;
                    }
                    
                    html += `</div>`;
                    generatedContent.innerHTML += html;
                    
                    totalTasksAdded++;
                    currentTaskNum++;
                }
            }

            if (totalTasksAdded === 0) {
                alert("Пожалуйста, укажите количество заданий в Конструкторе справа.");
                return;
            }

            // Переключаем виды
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('generated-view').style.display = 'block';
        }

        // ВОЗВРАТ В РЕДАКТОР
        function backToEditor() {
            document.getElementById('editor-view').style.display = 'grid';
            document.getElementById('generated-view').style.display = 'none';
        }
    </script>
</body>
</html>
