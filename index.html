<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор вариантов ЕГЭ по русскому языку</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВЫЕ СТИЛИ И МАГИЧЕСКИЙ ФОН */
        :root {
            --primary-glow: #8a2be2;
            --secondary-glow: #00ffff;
            --bg-color: #050b14;
            --panel-bg: rgba(10, 20, 40, 0.6);
            --text-light: #e0e6ed;
            --font-title: 'Cinzel', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.1) 0%, transparent 40%),
                url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop'); /* Фоновая картинка ночного леса */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-light);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* СТЕКЛЯННЫЕ ПАНЕЛИ (Glassmorphism) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* ЗАГОЛОВКИ */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 2.5em;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px var(--secondary-glow);
            margin-bottom: 5px;
        }

        .author {
            font-size: 1.2em;
            color: #b3c2d1;
            font-style: italic;
        }

        h2, h3 {
            font-family: var(--font-title);
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        /* ЭЛЕМЕНТЫ ФОРМЫ (Настройки) */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #a3c2f0;
        }

        select, input[type="number"], input[type="text"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #4a5c75;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-family: var(--font-body);
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--secondary-glow);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        /* Чекбоксы заданий */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .task-checkbox {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .task-checkbox:hover {
            background: rgba(255,255,255,0.1);
        }

        /* НЕОНОВЫЕ КНОПКИ */
        .buttons-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .neon-btn {
            background: transparent;
            color: #fff;
            font-family: var(--font-title);
            font-size: 1.1em;
            padding: 12px 24px;
            border: 2px solid var(--secondary-glow);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px var(--secondary-glow), inset 0 0 10px var(--secondary-glow);
            text-shadow: 0 0 5px #fff;
        }

        .neon-btn:hover {
            background: var(--secondary-glow);
            color: #000;
            box-shadow: 0 0 20px var(--secondary-glow), inset 0 0 20px var(--secondary-glow);
        }

        .neon-btn.purple {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px var(--primary-glow), inset 0 0 10px var(--primary-glow);
        }
        .neon-btn.purple:hover {
            background: var(--primary-glow);
            box-shadow: 0 0 20px var(--primary-glow), inset 0 0 20px var(--primary-glow);
        }

        /* ИНТЕРАКТИВНЫЙ ВАРИАНТ (ГЕНЕРАЦИЯ) */
        #test-container {
            display: none;
        }

        .task-block {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid var(--primary-glow);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .task-number {
            color: var(--secondary-glow);
            font-weight: bold;
            font-family: var(--font-title);
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .answer-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .check-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--text-light);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .check-btn:hover { background: rgba(255,255,255,0.2); }

        .result-msg { margin-left: 10px; font-weight: bold; }
        .correct { color: #00ffaa; text-shadow: 0 0 5px #00ffaa; }
        .incorrect { color: #ff4d4d; text-shadow: 0 0 5px #ff4d4d; }

        /* ПЛАВАЮЩИЕ ИНСТРУМЕНТЫ (Черновик, Карандаш) */
        .floating-tools {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .tool-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid var(--primary-glow);
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px var(--primary-glow);
            transition: 0.3s;
        }

        .tool-btn:hover, .tool-btn.active {
            background: var(--primary-glow);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Панель черновика */
        #draft-panel {
            display: none;
            position: fixed;
            right: 80px;
            bottom: 20px;
            width: 300px;
            height: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-glow);
            border-radius: 10px;
            padding: 10px;
            z-index: 999;
        }

        #draft-panel textarea {
            width: 100%;
            height: calc(100% - 30px);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            resize: none;
            outline: none;
            font-family: var(--font-body);
            padding: 10px;
            box-sizing: border-box;
        }

        /* ХОЛСТ ДЛЯ РИСОВАНИЯ (КАРАНДАШ) */
        #drawing-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Пропускает клики сквозь себя по умолчанию */
            z-index: 998;
        }

        #drawing-canvas.active {
            pointer-events: auto; /* Включает режим рисования */
            cursor: crosshair;
        }

        /* ТАЙМЕР */
        #timer-display {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            font-family: var(--font-title);
            color: var(--secondary-glow);
            text-shadow: 0 0 10px var(--secondary-glow);
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--secondary-glow);
            display: none;
            z-index: 100;
        }

        /* СТИЛИ ДЛЯ ПЕЧАТИ (PDF) */
        @media print {
            body {
                background: none;
                color: #000;
                background-color: #fff;
            }
            #editor-settings, .floating-tools, .neon-btn, .check-btn, #timer-display, header h1 {
                display: none !important;
            }
            .glass-panel {
                background: none;
                border: none;
                box-shadow: none;
                padding: 0;
                color: #000;
            }
            .task-block {
                border-left: 2px solid #000;
                color: #000;
                page-break-inside: avoid;
            }
            input[type="text"] {
                border: 1px solid #000;
                background: #fff;
                color: #000;
            }
            h2, .task-number { color: #000; text-shadow: none; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px;}
            .print-header h1 { color: #000; text-shadow:none; font-family: 'Times New Roman', serif;}
        }
        .print-header { display: none; }

    </style>
</head>
<body>

    <!-- Холст для рисования поверх экрана -->
    <canvas id="drawing-canvas"></canvas>

    <div id="timer-display">00:00:00</div>

    <div class="container">
        
        <header>
            <div class="print-header">
                <h1>Единый государственный экзамен по РУССКОМУ ЯЗЫКУ</h1>
            </div>
            <h1>Генератор вариантов ЕГЭ по русскому языку</h1>
            <div class="author">Автор: Гальмиз Мария Александровна</div>
        </header>

        <!-- ПАНЕЛЬ НАСТРОЕК (ДЛЯ УЧИТЕЛЯ) -->
        <div id="editor-settings" class="glass-panel">
            <h2>Настройки варианта</h2>
            
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Количество вариантов для генерации:</label>
                    <input type="number" id="variant-count" value="1" min="1" max="5">
                </div>
                
                <div class="setting-group">
                    <label>Таймер (минут, 0 - без таймера):</label>
                    <input type="number" id="timer-minutes" value="210" min="0">
                </div>

                <div class="setting-group">
                    <label>Режим ответов:</label>
                    <select id="answer-mode">
                        <option value="hide">Только после проверки учеником</option>
                        <option value="show">Показывать сразу (режим учителя)</option>
                    </select>
                </div>
            </div>

            <h3 style="margin-top: 20px;">Выберите задания для включения:</h3>
            <div class="tasks-grid" id="task-selector-grid">
                <!-- Генерируется через JS -->
            </div>

            <div class="buttons-panel">
                <button class="neon-btn" onclick="generateInteractive()">Создать интерактивный вариант</button>
                <button class="neon-btn purple" onclick="generatePrintPDF()">Файл для печати (PDF)</button>
                <button class="neon-btn" onclick="showKeys()">Ключи (Ответы)</button>
            </div>
        </div>

        <!-- КОНТЕЙНЕР ДЛЯ СГЕНЕРИРОВАННОГО ВАРИАНТА -->
        <div id="test-container" class="glass-panel">
            <h2 id="test-title">Вариант №1</h2>
            <div id="test-content">
                <!-- Сюда вставляются задания -->
            </div>
        </div>

    </div>

    <!-- ПЛАВАЮЩИЕ ИНСТРУМЕНТЫ -->
    <div class="floating-tools">
        <button class="tool-btn" onclick="togglePencil()" title="Рисовать (Карандаш)">✏️</button>
        <button class="tool-btn" onclick="toggleDraft()" title="Текстовый черновик">📝</button>
    </div>

    <!-- ПАНЕЛЬ ЧЕРНОВИКА -->
    <div id="draft-panel">
        <div style="color:var(--secondary-glow); font-family: var(--font-title); border-bottom:1px solid #4a5c75; padding-bottom:5px; margin-bottom:5px;">Черновик</div>
        <textarea placeholder="Пишите здесь ваши мысли..."></textarea>
    </div>


    <script>
        // БАЗА ДАННЫХ ЗАДАНИЙ (Демонстрационная)
        // Для реального использования сюда нужно добавить тексты заданий ФИПИ
        const fipiTasksDB = {};
        for(let i=1; i<=27; i++) {
            if(i === 27) {
                fipiTasksDB[i] = {
                    type: 'essay',
                    text: 'Напишите сочинение по прочитанному тексту. Сформулируйте одну из проблем, поставленных автором текста...',
                    answer: 'Проверяется экспертом'
                };
            } else {
                fipiTasksDB[i] = {
                    type: 'input',
                    text: `Демо-текст задания №${i} в формате ФИПИ. Прочитайте текст и выполните задание. Укажите варианты ответов, в которых...`,
                    answer: Math.floor(Math.random() * 89 + 10).toString() // Случайный ответ для тестов
                };
            }
        }

        // ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('task-selector-grid');
            for(let i=1; i<=27; i++) {
                const label = document.createElement('label');
                label.className = 'task-checkbox';
                label.innerHTML = `<input type="checkbox" value="${i}" checked style="margin-right:8px;"> ${i}`;
                grid.appendChild(label);
            }
            initCanvas();
        });

        let timerInterval;

        // ГЕНЕРАЦИЯ ИНТЕРАКТИВНОГО ВАРИАНТА
        function generateInteractive() {
            const container = document.getElementById('test-container');
            const content = document.getElementById('test-content');
            content.innerHTML = '';
            
            // Получаем выбранные задания
            const checkboxes = document.querySelectorAll('#task-selector-grid input:checked');
            const selectedTasks = Array.from(checkboxes).map(cb => parseInt(cb.value));
            
            if(selectedTasks.length === 0) {
                alert("Выберите хотя бы одно задание!");
                return;
            }

            const showAnswers = document.getElementById('answer-mode').value === 'show';

            selectedTasks.forEach(taskNum => {
                const taskData = fipiTasksDB[taskNum];
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task-block';
                
                let answerHtml = '';
                if(taskData.type === 'input') {
                    answerHtml = `
                        <div class="answer-area">
                            <input type="text" placeholder="Введите ответ..." id="answer-${taskNum}">
                            <button class="check-btn" onclick="checkAnswer(${taskNum}, '${taskData.answer}')">Проверить</button>
                            <span class="result-msg" id="result-${taskNum}"></span>
                            ${showAnswers ? `<div style="color:var(--secondary-glow); margin-left:15px;">Ответ: ${taskData.answer}</div>` : ''}
                        </div>
                    `;
                } else if (taskData.type === 'essay') {
                    answerHtml = `
                        <div class="answer-area" style="flex-direction:column; align-items:flex-start;">
                            <textarea style="width:100%; height:150px; background:rgba(0,0,0,0.4); color:#fff; border:1px solid #4a5c75; padding:10px; border-radius:5px;" placeholder="Поле для написания сочинения..."></textarea>
                        </div>
                    `;
                }

                taskDiv.innerHTML = `
                    <div class="task-number">Задание ${taskNum}</div>
                    <div class="task-text">${taskData.text}</div>
                    ${answerHtml}
                `;
                content.appendChild(taskDiv);
            });

            container.style.display = 'block';
            startTimer();
            
            // Плавный скролл к тесту
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // ПРОВЕРКА ОТВЕТА
        function checkAnswer(taskNum, correctAnswer) {
            const userInput = document.getElementById(`answer-${taskNum}`).value.trim().toLowerCase();
            const resultSpan = document.getElementById(`result-${taskNum}`);
            
            if(userInput === correctAnswer.toLowerCase()) {
                resultSpan.textContent = "Верно!";
                resultSpan.className = "result-msg correct";
            } else {
                resultSpan.textContent = "Ошибка!";
                resultSpan.className = "result-msg incorrect";
            }
        }

        // ТАЙМЕР
        function startTimer() {
            clearInterval(timerInterval);
            const minutes = parseInt(document.getElementById('timer-minutes').value);
            const timerDisplay = document.getElementById('timer-display');
            
            if(minutes > 0) {
                let time = minutes * 60;
                timerDisplay.style.display = 'block';
                
                timerInterval = setInterval(() => {
                    const h = Math.floor(time / 3600);
                    const m = Math.floor((time % 3600) / 60);
                    const s = time % 60;
                    
                    timerDisplay.textContent = 
                        `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                    
                    if(time <= 0) {
                        clearInterval(timerInterval);
                        alert("Время вышло!");
                    }
                    time--;
                }, 1000);
            } else {
                timerDisplay.style.display = 'none';
            }
        }

        // ПЕЧАТЬ (PDF)
        function generatePrintPDF() {
            // Если вариант еще не сгенерирован - генерируем
            if(document.getElementById('test-content').innerHTML === '') {
                generateInteractive();
            }
            window.print();
        }

        // КЛЮЧИ (ОТВЕТЫ)
        function showKeys() {
            const checkboxes = document.querySelectorAll('#task-selector-grid input:checked');
            let keysText = "КЛЮЧИ К ВАРИАНТУ:\n\n";
            checkboxes.forEach(cb => {
                const num = cb.value;
                keysText += `Задание ${num}: ${fipiTasksDB[num].answer}\n`;
            });
            alert(keysText);
        }

        // ЧЕРНОВИК
        function toggleDraft() {
            const panel = document.getElementById('draft-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // КАРАНДАШ (РИСОВАНИЕ НА ХОЛСТЕ)
        let isDrawingMode = false;
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            // Настройка размера холста под окно
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.strokeStyle = '#00ffff'; // Неоновый голубой карандаш
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#00ffff';
            }
            window.addEventListener('resize', resize);
            resize();

            // События рисования
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(e.clientX, e.clientY);
            });

            canvas.addEventListener('mousemove', (e) => {
                if(isDrawing && isDrawingMode) {
                    ctx.lineTo(e.clientX, e.clientY);
                    ctx.stroke();
                }
            });

            canvas.addEventListener('mouseup', () => isDrawing = false);
            canvas.addEventListener('mouseout', () => isDrawing = false);
        }

        function togglePencil() {
            isDrawingMode = !isDrawingMode;
            const btn = document.querySelector('.tool-btn[title="Рисовать (Карандаш)"]');
            
            if(isDrawingMode) {
                canvas.classList.add('active');
                btn.classList.add('active');
                document.body.style.overflow = 'hidden'; // Запрет скролла при рисовании
            } else {
                canvas.classList.remove('active');
                btn.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
